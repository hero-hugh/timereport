name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma clients
        run: npm run db:generate:all

      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npm run db:generate:all
        working-directory: apps/api

      - name: Create API env file
        run: |
          printf '%s\n' \
            'AUTH_DATABASE_URL="file:./data/auth.db"' \
            'USER_DATABASE_URL="file:./data/placeholder.db"' \
            'DATABASE_DIR="./data"' \
            'JWT_SECRET="ci-test-secret-must-be-at-least-32-characters"' \
            'JWT_REFRESH_SECRET="ci-test-refresh-secret-must-be-32-chars"' \
            'FRONTEND_URL="http://localhost:5173"' \
            > apps/api/.env.local

      - name: Set up databases
        run: |
          npm run db:push:auth
          npm run db:push:user
        working-directory: apps/api
        env:
          AUTH_DATABASE_URL: "file:./data/auth.db"
          USER_DATABASE_URL: "file:./data/placeholder.db"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_TEST_OTP: "000000"
          AUTH_DATABASE_URL: "file:./data/auth.db"
          USER_DATABASE_URL: "file:./data/placeholder.db"
          DATABASE_DIR: "./data"
          JWT_SECRET: "ci-test-secret-must-be-at-least-32-characters"
          JWT_REFRESH_SECRET: "ci-test-refresh-secret-must-be-32-chars"
          FRONTEND_URL: "http://localhost:5173"

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: false
